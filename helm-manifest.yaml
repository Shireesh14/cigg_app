---
# Source: cigg-app/templates/db-migration-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: cigg-app-cigg-app-db-migration-sql
data:
  V1__init.sql: |-
    CREATE TABLE IF NOT EXISTS entries (
        id SERIAL PRIMARY KEY,
        quantity INTEGER NOT NULL CHECK (quantity > 0),
        location VARCHAR(255) NOT NULL,
        notes TEXT,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
---
# Source: cigg-app/templates/backend-srv.yml
apiVersion: v1
kind: Service
metadata:
  name: cigg-app-cigg-app-backend-service
spec:
  type: ClusterIP
  selector:
   app: cigg-app-cigg-app-backend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
---
# Source: cigg-app/templates/db-srv.yml
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  clusterIP: None
  selector:
    app: cigg-app-cigg-app-statefulset
  ports:
    - port: 5432
      targetPort: 5432
---
# Source: cigg-app/templates/frontend-srv.yml
apiVersion: v1
kind: Service
metadata:
  name: my-service
spec:
  type: ClusterIP
  selector:
   app: cigg-app-cigg-app-frontend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
# Source: cigg-app/templates/backend-deployment.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cigg-app-cigg-app-backend
  labels:
    app: cigg-app-cigg-app-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cigg-app-cigg-app-backend
  template:
    metadata:
      labels:
        app: cigg-app-cigg-app-backend
    spec:
      # Init container to wait for DB
      initContainers:
      - name: wait-for-db
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            echo "Waiting for PostgreSQL..."
            until nc -z postgres 5432; do
              echo "DB not ready..."
              sleep 2
            done
            echo "DB ready!"

      containers:
      - name: cigg-app-cigg-app-backend
        image: shireesh14/cig-backend:d96282f71ef813c223a894ee96ae792c537f0e88
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: DB_HOST
          value: postgres
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: cigtracker
        - name: DB_USER
          value: cigtracker
        - name: DB_PASSWORD
          value: password
        - name: PORT
          value: "3000"
        - name: NODE_ENV
          value: production
        startupProbe:
          httpGet:
            path: /health
            port: 3000
          failureThreshold: 30
          periodSeconds: 10
      
        livenessProbe:
          httpGet:
            path: /health
            port: 3000       
          initialDelaySeconds: 5
          periodSeconds: 4
        
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 4

        resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 250m
              memory: 128Mi
---
# Source: cigg-app/templates/frontend-deployment.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cigg-app-cigg-app-frontend
  labels:

---
# Source: cigg-app/templates/db-statefulset.yml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cigg-app-cigg-app-statefulset
spec:
  selector:
    matchLabels:
      app: cigg-app-cigg-app-statefulset
  serviceName: postgres
  replicas: 1
  template:
    metadata:
      labels:
        app: cigg-app-cigg-app-statefulset
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
          - name: POSTGRES_USER
            value: cigtracker
          - name: POSTGRES_PASSWORD
            value: password
          - name: POSTGRES_DB
            value: cigtracker    
        volumeMounts:
          - name: postgres-storage
            mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: standard
      resources:
        requests:
          storage: 1Gi
---
# Source: cigg-app/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cigg-app-cigg-app-ingress
spec:
  rules:
  - host: cigg-app.local
    http:
      paths:
      # BACKEND: match /api first
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: cigg-app-cigg-app-backend-service
            port:
              number: 3000
      # FRONTEND: catch-all
      - path: /
        pathType: Prefix
        backend:
          service:
            name: my-service
            port:
              number: 8080


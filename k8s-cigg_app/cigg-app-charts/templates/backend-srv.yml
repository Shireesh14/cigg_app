apiVersion: v1
kind: Service
metadata:
  name: {{ include "cigg-app.fullname" . }}-backend-service
  labels:
    app: {{ include "cigg-app.fullname" . }}-backend
spec:
  type: {{ .Values.backend.services.type }}
  selector:
   app: {{ include "cigg-app.fullname" . }}-backend
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.backend.services.port }}
      targetPort: {{ .Values.backend.services.port }}
    
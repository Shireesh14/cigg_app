apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cigg-app.fullname" . }}-db-migration-sql
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  {{- range $filename, $content := .Values.migration.sqlFiles }}
  {{ $filename }}: |-
{{ $content | indent 4 }}
  {{- end }}
backend:
  replicaCount: 1
  containerPort: 3000

  image:
    repository: shireesh14/cig-backend
    tag: d96282f71ef813c223a894ee96ae792c537f0e88
    pullPolicy: IfNotPresent

  resources:
    requests:
      memory: "128Mi"
      cpu: "250m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  services:
    type: ClusterIP
    port: 3000

  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 79


frontend:
  replicaCount: 1
  containerPort: 8080

  image:
    repository: shireesh14/cig-frontend
    tag: 5f9a3f91f31b3af151d91789ccc14b2db8d042da
    pullPolicy: IfNotPresent

  services:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      memory: "128Mi"
      cpu: "250m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 79


db:
  image: postgres:15
  db: cigtracker
  storage: 1Gi

ingress:
  host: cigg-app.local

migration:
  image: flyway/flyway:9
  jdbcUrl: jdbc:postgresql://postgres:5432/cigtracker